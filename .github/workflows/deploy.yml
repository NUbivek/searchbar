name: CI Build (Next.js)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2

    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '18'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Build
      run: npm run build
      env:
        NEXT_PUBLIC_API_BASE_URL: "https://research.bivek.ai"
        NEXT_PUBLIC_ENABLE_LOGGING: "true"
        NEXT_PUBLIC_DEBUG_MODE: "false"
        NEXT_PUBLIC_SHOW_CHAT_HISTORY: "false"
        NEXT_PUBLIC_SHOW_METRICS: "false"

    - name: Note
      run: echo "GitHub Actions now validates build only. Production deployment should be handled by Vercel."